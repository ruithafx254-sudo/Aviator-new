<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Crash Terminal</title>

    <style>
        :root { 
            --aviator-bg: #000000;
            --main-panel-bg: #141516;
            --control-panel-bg: #181a1d;
            --accent-green: #28a745;
            --bet-green: #12cf5c;
            --betika-dark: #101112;
            --betika-border: #1f2226;
            --text-primary: #ffffff;
            --text-secondary: #9ea3a8;
            --aviator-red: #d91d38;
        }
        
        body { 
            background: var(--betika-dark); 
            color: var(--text-primary); 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased; 
            box-sizing: border-box;
        }

        /* Redesigned Premium Header without Back Button */
        .top-header-navbar {
            background: #111315;
            border-bottom: 1px solid var(--betika-border);
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px; z-index: 2000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header-left { display: flex; align-items: center; }
        .game-brand-labels { display: flex; flex-direction: column; line-height: 1.1; }
        .brand-main-text { font-weight: 900; font-size: 20px; color: var(--aviator-red); letter-spacing: -0.2px; text-transform: uppercase; }
        
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .user-balance-pill { 
            display: flex; align-items: center; background: rgba(0,0,0,0.5); 
            border: 1px solid var(--betika-border); padding: 6px 12px; 
            border-radius: 20px; font-size: 13px; font-weight: 800; color: #12cf5c;
            box-shadow: inset 0 1px 10px rgba(0,0,0,0.4); 
        }
        .user-balance-pill span { color: #8a8f95; font-weight: 700; font-size: 11px; margin-left: 4px; text-transform: uppercase; }
        
        .action-header-btn { 
            background: #1c1d21; color: #fff; border: 1px solid var(--betika-border);
            padding: 8px 14px; border-radius: 20px; font-weight: 800; 
            font-size: 11px; cursor: pointer; text-transform: uppercase;
            transition: transform 0.1s ease;
        }
        .action-header-btn.deposit {
            background: #12cf5c; border: none;
            box-shadow: 0 4px 12px rgba(18, 207, 92, 0.25);
        }
        .action-header-btn:active { transform: scale(0.96); }

        /* Main Game Content Area */
        .gameplay-layout-container {
            max-width: 800px; margin: 76px auto 24px;
            padding: 0 12px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 14px;
        }

        /* Visual Board styling matched exactly */
        .aviator-flight-panel {
            background: #151719; border: 1px solid var(--betika-border);
            border-radius: 16px; padding: 10px; position: relative; overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .canvas-container {
            background: #000000; border-radius: 12px; border: 1px solid rgba(255,255,255,0.015);
            position: relative; overflow: hidden; height: 230px; width: 100%;
        }
        .game-canvas { width: 100%; height: 100%; display: block; }
        
        /* Small multipliers history bar */
        .history-pills-row {
            display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 10px;
            scrollbar-width: none; font-size: 11px; font-weight: 700;
        }
        .history-pills-row::-webkit-scrollbar { display: none; }
        .history-pill { background: #1c1d21; color: #34b3ff; padding: 4px 11px; border-radius: 12px; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .history-pill.high { color: #c05df1; }

        .flight-counter { 
            position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; pointer-events: none; width: 100%; z-index: 10;
        }
        .live-mult { font-size: 56px; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 4px 16px rgba(0,0,0,0.95); }
        .live-status { font-size: 13px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; margin-top: 6px; letter-spacing: 0.5px; }

        /* Betting Controls Area */
        .betting-console-board {
            display: grid; grid-template-columns: 1fr; gap: 14px; width: 100%;
        }
        @media(min-width: 600px) {
            .betting-console-board { grid-template-columns: 1fr 1fr; }
        }

        .control-dashboard-panel {
            background: var(--control-panel-bg); border: 1px solid var(--betika-border);
            border-radius: 18px; padding: 14px; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        
        .dashboard-category-tabs { 
            display: flex; background: #101112; border-radius: 20px; padding: 3px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .dashboard-tab { flex: 1; padding: 7px; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-align: center; cursor: pointer; border-radius: 16px; text-transform: uppercase; }
        .dashboard-tab.active { background: #2c3035; color: #fff; }

        .wager-entry-row { display: grid; grid-template-columns: 1fr 1.15fr; gap: 10px; align-items: center; }
        .wager-box { 
            background: #101112; border: 1px solid var(--betika-border); 
            border-radius: 16px; padding: 6px 14px; display: flex; flex-direction: column; justify-content: center; height: 62px; box-sizing: border-box;
        }
        
        /* Adjustment +/- Stepper style */
        .stepper-wager-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
        .stepper-btn { background: none; border: none; color: var(--text-secondary); font-size: 22px; cursor: pointer; padding: 0 6px; font-weight: bold; outline: none; }
        .wager-input { background: transparent; border: none; color: #fff; font-size: 20px; font-weight: 800; outline: none; width: 66px; text-align: center; }

        .bet-btn { 
            border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; border: none; transition: all 0.1s ease; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 62px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .bet-btn:active { transform: scale(0.97); }
        .bet-btn.place { background: var(--bet-green); color: #fff; box-shadow: 0 4px 15px rgba(18, 207, 92, 0.2); }
        .bet-btn.cash { background: #ea580c; color: #fff; box-shadow: 0 4px 15px rgba(234, 88, 12, 0.25); }
        .bet-btn:disabled { background: #212429; color: #525861; cursor: not-allowed; box-shadow: none; }

        .quick-amounts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .quick-amt-chip { border: 1px solid var(--betika-border); padding: 9px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; background: #101112; text-align: center; color: #9ea3a8; transition: background 0.15s ease; }
        .quick-amt-chip:active { background: #2c3035; color: #fff; }

        /* Auto Controls Section */
        .auto-controls-section {
            background: #101112; border: 1px solid var(--betika-border);
            border-radius: 14px; padding: 12px; display: flex; flex-direction: column; gap: 10px;
            animation: slideDown 0.2s ease-out; margin-top: 2px;
        }
        .auto-switch-row { display: flex; justify-content: space-between; align-items: center; }
        .auto-switch-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        
        /* Premium Custom Checkbox Toggle */
        .switch-input-wrapper { position: relative; width: 44px; height: 22px; }
        .switch-input-wrapper input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2c3035; border-radius: 34px; transition: .3s;
        }
        .toggle-slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; border-radius: 50%; transition: .3s;
        }
        input:checked + .toggle-slider { background-color: var(--bet-green); }
        input:checked + .toggle-slider:before { transform: translateX(22px); }

        .auto-input-box {
            display: flex; align-items: center; justify-content: space-between;
            background: #181a1d; border: 1px solid var(--betika-border);
            padding: 6px 12px; border-radius: 10px;
        }
        .auto-input-field { background: transparent; border: none; color: #fff; font-size: 14px; font-weight: 700; width: 60px; outline: none; text-align: right; }

        /* Floating AI Target Tool */
        .floating-ai-assistant {
            position: fixed; bottom: 24px; right: 24px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.8), rgba(79, 70, 229, 0.8));
            backdrop-filter: blur(8px); color: #fff; border-radius: 50%; width: 62px; height: 62px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4); z-index: 3000;
            cursor: pointer; transition: transform 0.2s;
            border: 2px solid rgba(167, 139, 250, 0.5); text-align: center;
        }
        .floating-ai-assistant:active { transform: scale(0.92); }
        .floating-ai-label { font-size: 8px; font-weight: 900; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 2px; opacity: 0.9; }
        .floating-ai-value { font-size: 13px; font-weight: 800; }

        /* Sliding Modals */
        .overlay-screen { 
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(6px); z-index: 5000; align-items: center; justify-content: center; padding: 16px; 
        }
        .form-modal-card { 
            background: #181a1d; border: 1px solid var(--betika-border); 
            width: 100%; max-width: 350px; padding: 22px; border-radius: 18px; box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideDown 0.2s ease-out;
        }
        .form-input-group { text-align: left; margin-bottom: 14px; }
        .form-input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; }
        .form-input-control { 
            width: 100%; padding: 12px; background: #101112; border: 1px solid var(--betika-border); 
            border-radius: 12px; font-size: 15px; box-sizing: border-box; outline: none; color: #fff; 
        }
        .form-submit-btn { 
            width: 100%; padding: 14px; background: var(--bet-green); color: #fff; 
            border: none; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 13px; 
            text-transform: uppercase; margin-top: 8px; box-shadow: 0 4px 15px rgba(18, 207, 92, 0.2);
            transition: transform 0.1s ease;
        }
        .form-submit-btn.withdraw-btn { background: #0284c7; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.2); }
        .form-submit-btn:active { transform: scale(0.98); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-header-navbar">
        <div class="header-left">
            <div class="game-brand-labels">
                <span class="brand-main-text">Aviator</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="user-balance-pill">
                <div id="balanceDisplay">3,000.00</div><span>KES</span>
            </div>
            <button onclick="openModal('withdrawModal')" class="action-header-btn">Withdraw</button>
            <button onclick="openModal('depositModal')" class="action-header-btn deposit">Deposit</button>
        </div>
    </div>

    <div class="gameplay-layout-container">
        <div class="history-pills-row" id="historyPills">
            <div class="history-pill">1.85x</div>
            <div class="history-pill high">3.90x</div>
            <div class="history-pill">1.00x</div>
            <div class="history-pill">1.92x</div>
            <div class="history-pill">1.51x</div>
            <div class="history-pill high">5.62x</div>
            <div class="history-pill">1.18x</div>
        </div>

        <div class="aviator-flight-panel">
            <div class="canvas-container">
                <canvas id="liveGameCanvas" class="game-canvas" width="540" height="230"></canvas>
                <div class="flight-counter">
                    <div id="liveDisplayMultiplier" class="live-mult">1.00x</div>
                    <div id="liveFlightStatusText" class="live-status">Loading Systems...</div>
                </div>
            </div>
        </div>

        <div class="betting-console-board">
            <div class="control-dashboard-panel">
                <div class="dashboard-category-tabs">
                    <div id="tabBet1" class="dashboard-tab active" onclick="switchBetCategory(1, 'bet')">Bet</div>
                    <div id="tabAuto1" class="dashboard-tab" onclick="switchBetCategory(1, 'auto')">Auto</div>
                </div>
                <div class="wager-entry-row">
                    <div class="wager-box">
                        <div class="stepper-wager-controls">
                            <button class="stepper-btn" onclick="adjustWager(1, -10)">−</button>
                            <input type="number" id="wagerInput1" class="wager-input" value="10" min="10">
                            <button class="stepper-btn" onclick="adjustWager(1, 10)">+</button>
                        </div>
                    </div>
                    <button id="wagerSubmitBtn1" onclick="processWager(1)" class="bet-btn place">
                        <span>Bet</span><span style="font-size: 11px; font-weight: 700; margin-top:2px;" id="subLabel1">10.00 KES</span>
                    </button>
                </div>
                <div class="quick-amounts-grid" id="quickGrid1">
                    <div class="quick-amt-chip" onclick="setFixedWager(1, 100)">100</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(1, 200)">200</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(1, 500)">500</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(1, 10000)">10,000</div>
                </div>
                <div id="autoControls1" class="auto-controls-section hidden">
                    <div class="auto-switch-row">
                        <span class="auto-switch-label">Auto Cash Out</span>
                        <label class="switch-input-wrapper">
                            <input type="checkbox" id="autoCashoutToggle1">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="auto-input-box">
                        <span style="font-size: 11px; font-weight:700; color:var(--text-secondary);">MULTIPLIER</span>
                        <input type="number" step="0.01" id="autoCashoutTarget1" class="auto-input-field" value="2.00">
                    </div>
                </div>
            </div>

            <div class="control-dashboard-panel">
                <div class="dashboard-category-tabs">
                    <div id="tabBet2" class="dashboard-tab active" onclick="switchBetCategory(2, 'bet')">Bet</div>
                    <div id="tabAuto2" class="dashboard-tab" onclick="switchBetCategory(2, 'auto')">Auto</div>
                </div>
                <div class="wager-entry-row">
                    <div class="wager-box">
                        <div class="stepper-wager-controls">
                            <button class="stepper-btn" onclick="adjustWager(2, -10)">−</button>
                            <input type="number" id="wagerInput2" class="wager-input" value="10" min="10">
                            <button class="stepper-btn" onclick="adjustWager(2, 10)">+</button>
                        </div>
                    </div>
                    <button id="wagerSubmitBtn2" onclick="processWager(2)" class="bet-btn place">
                        <span>Bet</span><span style="font-size: 11px; font-weight: 700; margin-top:2px;" id="subLabel2">10.00 KES</span>
                    </button>
                </div>
                <div class="quick-amounts-grid" id="quickGrid2">
                    <div class="quick-amt-chip" onclick="setFixedWager(2, 100)">100</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(2, 200)">200</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(2, 500)">500</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(2, 10000)">10,000</div>
                </div>
                <div id="autoControls2" class="auto-controls-section hidden">
                    <div class="auto-switch-row">
                        <span class="auto-switch-label">Auto Cash Out</span>
                        <label class="switch-input-wrapper">
                            <input type="checkbox" id="autoCashoutToggle2">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="auto-input-box">
                        <span style="font-size: 11px; font-weight:700; color:var(--text-secondary);">MULTIPLIER</span>
                        <input type="number" step="0.01" id="autoCashoutTarget2" class="auto-input-field" value="2.00">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="aiOrb" class="floating-ai-assistant">
        <div class="floating-ai-label">AI Signal</div>
        <div id="aiDirectPrediction" class="floating-ai-value">---</div>
    </div>

    <div id="depositModal" class="overlay-screen">
        <div class="form-modal-card">
            <h3 style="margin-top: 0; font-size: 16px; text-align: center; color:#12cf5c;">M-Pesa Deposit</h3>
            <div class="form-input-group">
                <label>Phone Number</label>
                <input type="tel" id="depPhone" class="form-input-control" placeholder="e.g. 0712345678" required>
            </div>
            <div class="form-input-group">
                <label>Amount (KES)</label>
                <input type="number" id="depAmount" class="form-input-control" value="100" min="10" required>
            </div>
            <button onclick="executePayheroDeposit()" class="form-submit-btn">Deposit via M-Pesa</button>
            <p style="text-align:center; font-size: 12px; color: var(--text-secondary); margin-bottom: 0; cursor: pointer; margin-top:14px;" onclick="closeModal('depositModal')">Dismiss</p>
        </div>
    </div>

    <div id="withdrawModal" class="overlay-screen">
        <div class="form-modal-card">
            <h3 style="margin-top: 0; font-size: 16px; text-align: center; color: #0284c7;">M-Pesa Withdrawal</h3>
            <div class="form-input-group">
                <label>M-Pesa Phone Number</label>
                <input type="tel" id="wdPhone" class="form-input-control" placeholder="e.g. 0712345678" required>
            </div>
            <div class="form-input-group">
                <label>Amount (KES)</label>
                <input type="number" id="wdAmount" class="form-input-control" placeholder="Minimum 100" min="100" required>
            </div>
            <button onclick="executeWithdrawal()" class="form-submit-btn withdraw-btn">Request Withdrawal</button>
            <p style="text-align:center; font-size: 12px; color: var(--text-secondary); margin-bottom: 0; cursor: pointer; margin-top:14px;" onclick="closeModal('withdrawModal')">Dismiss</p>
        </div>
    </div>

    <script>
        // Memory-Based LocalStorage
        let clientUserBalance = parseFloat(localStorage.getItem('terminal_balance') || '3000.00');

        let gameStatus = "waiting"; 
        let currentMultiplier = 1.00;
        let crashCeiling = 2.15;

        let activePanelBets = { 1: 0, 2: 0 };
        let cashoutStates = { 1: false, 2: false };
        let launchTimeMillis = 0;

        const cvs = document.getElementById('liveGameCanvas');
        const ctx = cvs.getContext('2d');

        window.onload = () => {
            updateVisualUIBalance();
            initializeCanvasFlight();
            triggerGameLoopEngine();
        };

        function updateVisualUIBalance() {
            document.getElementById('balanceDisplay').innerText = clientUserBalance.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            localStorage.setItem('terminal_balance', clientUserBalance.toString());
        }

        // Betting & Auto Tabs Handlers
        function switchBetCategory(panel, category) {
            const isBet = category === 'bet';
            document.getElementById(`tabBet${panel}`).className = `dashboard-tab ${isBet ? 'active' : ''}`;
            document.getElementById(`tabAuto${panel}`).className = `dashboard-tab ${!isBet ? 'active' : ''}`;
            
            if (isBet) {
                document.getElementById(`autoControls${panel}`).classList.add('hidden');
                document.getElementById(`quickGrid${panel}`).classList.remove('hidden');
            } else {
                document.getElementById(`autoControls${panel}`).classList.remove('hidden');
                document.getElementById(`quickGrid${panel}`).classList.add('hidden');
            }
        }

        function adjustWager(panel, delta) {
            const el = document.getElementById(`wagerInput${panel}`);
            let val = Math.max(10, (parseFloat(el.value) || 10) + delta);
            el.value = val;
            document.getElementById(`subLabel${panel}`).innerText = `${val.toFixed(2)} KES`;
        }

        function setFixedWager(panel, value) {
            const el = document.getElementById(`wagerInput${panel}`);
            el.value = value;
            document.getElementById(`subLabel${panel}`).innerText = `${value.toFixed(2)} KES`;
        }

        function initializeCanvasFlight() {
            function drawFrame() {
                ctx.clearRect(0, 0, cvs.width, cvs.height);
                
                ctx.strokeStyle = "rgba(255, 255, 255, 0.02)";
                ctx.lineWidth = 1;
                for (let x = 0; x < cvs.width; x += 40) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, cvs.height); ctx.stroke();
                }
                for (let y = 0; y < cvs.height; y += 40) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cvs.width, y); ctx.stroke();
                }

                if (gameStatus === "flying") {
                    let progress = (currentMultiplier - 1.0) / (crashCeiling - 1.0 || 1.0);
                    progress = Math.min(progress, 1.0);

                    ctx.strokeStyle = "var(--aviator-red)";
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(0, cvs.height);
                    let endX = cvs.width * progress;
                    let endY = cvs.height - (cvs.height * 0.72 * Math.pow(progress, 1.35));
                    
                    ctx.quadraticCurveTo(cvs.width * progress * 0.5, cvs.height, endX, endY);
                    ctx.stroke();

                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(endX, endY, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(drawFrame);
            }
            drawFrame();
        }

        function triggerGameLoopEngine() {
            gameStatus = "waiting";
            currentMultiplier = 1.00;
            cashoutStates = { 1: false, 2: false };

            crashCeiling = parseFloat((1.05 + Math.random() * 3.95).toFixed(2));

            document.getElementById('aiDirectPrediction').innerText = crashCeiling.toFixed(2) + "x";
            document.getElementById('liveDisplayMultiplier').innerText = "1.00x";
            document.getElementById('liveDisplayMultiplier').style.color = "#fff";

            let cycleTimer = 6;
            document.getElementById('liveFlightStatusText').innerText = `NEXT ROUND IN ${cycleTimer}s`;

            resetBetButtons();

            const timerSub = setInterval(() => {
                cycleTimer--;
                if (cycleTimer > 0) {
                    document.getElementById('liveFlightStatusText').innerText = `NEXT ROUND IN ${cycleTimer}s`;
                } else {
                    clearInterval(timerSub);
                    startTakeoffPhase();
                }
            }, 1000);
        }

        function resetBetButtons() {
            for (let i = 1; i <= 2; i++) {
                const btn = document.getElementById(`wagerSubmitBtn${i}`);
                const amountInput = parseFloat(document.getElementById(`wagerInput${i}`).value) || 10;
                btn.disabled = false;
                btn.className = "bet-btn place";
                btn.innerHTML = `<span>Bet</span><span style="font-size:11px; margin-top:2px;" id="subLabel${i}">${amountInput.toFixed(2)} KES</span>`;
                activePanelBets[i] = 0;
            }
        }

        function startTakeoffPhase() {
            gameStatus = "flying";
            launchTimeMillis = performance.now();
            document.getElementById('liveFlightStatusText').innerText = "Flying High";

            for (let i = 1; i <= 2; i++) {
                const btn = document.getElementById(`wagerSubmitBtn${i}`);
                if (activePanelBets[i] > 0) {
                    btn.disabled = false;
                    btn.className = "bet-btn cash";
                    btn.innerHTML = `<span>Cash Out</span><span style="font-size: 11px; margin-top:2px;" id="subLabel${i}">${activePanelBets[i].toFixed(2)} KES</span>`;
                } else {
                    btn.disabled = true;
                }
            }

            function fly() {
                if (gameStatus !== "flying") return;
                let elapsed = (performance.now() - launchTimeMillis) / 1000;
                currentMultiplier = parseFloat(Math.pow(1.085, elapsed * 1.8).toFixed(2));

                if (currentMultiplier >= crashCeiling) {
                    triggerCrashEvent();
                } else {
                    document.getElementById('liveDisplayMultiplier').innerText = currentMultiplier.toFixed(2) + "x";
                    
                    for (let i = 1; i <= 2; i++) {
                        // Regular interactive cashout tracking
                        if (activePanelBets[i] > 0 && !cashoutStates[i]) {
                            const btn = document.getElementById(`wagerSubmitBtn${i}`);
                            const currentPayout = (activePanelBets[i] * currentMultiplier).toFixed(2);
                            btn.innerHTML = `<span>Cash Out</span><span style="font-size: 11px; margin-top:2px;" id="subLabel${i}">${currentPayout} KES</span>`;

                            // Execute Auto cashout check if toggled
                            const isAutoCheck = document.getElementById(`autoCashoutToggle${i}`).checked;
                            const targetVal = parseFloat(document.getElementById(`autoCashoutTarget${i}`).value) || 1.01;
                            
                            if (isAutoCheck && currentMultiplier >= targetVal) {
                                executeCashOut(i);
                            }
                        }
                    }
                    setTimeout(fly, 75);
                }
            }
            fly();
        }

        function triggerCrashEvent() {
            gameStatus = "crashed";
            document.getElementById('liveDisplayMultiplier').innerText = "FLEW AWAY!";
            document.getElementById('liveDisplayMultiplier').style.color = "var(--aviator-red)";
            document.getElementById('liveFlightStatusText').innerText = `${crashCeiling.toFixed(2)}x`;

            const pastLine = document.getElementById('historyPills');
            const item = document.createElement('div');
            item.className = `history-pill ${crashCeiling >= 2.0 ? 'high' : ''}`;
            item.innerText = crashCeiling.toFixed(2) + "x";
            pastLine.prepend(item);

            if (pastLine.children.length > 8) {
                pastLine.removeChild(pastLine.lastChild);
            }

            for (let i = 1; i <= 2; i++) {
                const btn = document.getElementById(`wagerSubmitBtn${i}`);
                btn.disabled = true;
                btn.className = "bet-btn place";
                btn.innerHTML = `<span>Crashed</span>`;
            }

            setTimeout(triggerGameLoopEngine, 3500);
        }

        function processWager(panel) {
            const stakeValue = parseFloat(document.getElementById(`wagerInput${panel}`).value) || 0;
            const btn = document.getElementById(`wagerSubmitBtn${panel}`);

            if (gameStatus === "waiting") {
                if (stakeValue > clientUserBalance) return alert("Insufficient account funds.");
                if (stakeValue < 10) return alert("Minimum bet required is 10 KES.");

                clientUserBalance -= stakeValue;
                activePanelBets[panel] = stakeValue;
                updateVisualUIBalance();

                btn.disabled = true;
                btn.innerHTML = `<span>Locked...</span>`;
            } else if (gameStatus === "flying" && activePanelBets[panel] > 0 && !cashoutStates[panel]) {
                executeCashOut(panel);
            }
        }

        function executeCashOut(panel) {
            cashoutStates[panel] = true;
            const netReturns = activePanelBets[panel] * currentMultiplier;
            clientUserBalance += netReturns;
            updateVisualUIBalance();

            activePanelBets[panel] = 0;
            const btn = document.getElementById(`wagerSubmitBtn${panel}`);
            btn.disabled = true;
            btn.className = "bet-btn place";
            btn.innerHTML = `<span>Cashed Out</span>`;
            alert(`Successfully cashed out at ${currentMultiplier}x! You won KES ${netReturns.toFixed(2)}`);
        }

        // M-Pesa Embedded Payments Handlers
        function executePayheroDeposit() {
            let phone = document.getElementById('depPhone').value;
            let amount = parseFloat(document.getElementById('depAmount').value) || 0;
            if (!phone) return alert("Please input your M-Pesa number.");
            if (amount < 10) return alert("Deposit minimum limit is KES 10.");

            closeModal('depositModal');
            alert(`STK Push request initialized via Payhero to ${phone}. Completing simulation credit...`);
            
            // Simulating a dynamic direct deposit processing link
            setTimeout(() => {
                clientUserBalance += amount;
                updateVisualUIBalance();
                alert(`Account successfully recharged with KES ${amount.toLocaleString()}`);
            }, 1500);
        }

        function executeWithdrawal() {
            let phone = document.getElementById('wdPhone').value;
            let amount = parseFloat(document.getElementById('wdAmount').value) || 0;
            if (!phone) return alert("Enter valid withdrawal phone number.");
            if (amount < 100) return alert("Withdrawal minimum limit is KES 100.");
            if (amount > clientUserBalance) return alert("Insufficient funds available to cash out.");

            clientUserBalance -= amount;
            updateVisualUIBalance();
            closeModal('withdrawModal');
            alert(`Withdrawal initialized for KES ${amount.toLocaleString()} directly to your phone.`);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
