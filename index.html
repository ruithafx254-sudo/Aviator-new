<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Gaming & AI Predictor</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --accent-red: #e11d48;
            --accent-green: #10b981;
            --bg-dark: #090d16;
            --bg-card: #151f32;
            --border: #334155;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }
        
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding-top: 84px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
        }

        /* Fixed Navigation Header */
        .header-stack { position: fixed; top: 0; left: 0; right: 0; background: #0c1322; z-index: 2000; border-bottom: 1px solid var(--border); }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 72px; }
        .logo-wrap { display: flex; flex-direction: column; line-height: 1; }
        .logo-main { font-weight: 900; font-size: 22px; letter-spacing: -0.5px; color: #fff; text-transform: uppercase; }
        .logo-sub { font-size: 10px; font-weight: 800; color: var(--accent-red); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
        
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .wallet-pill { display: flex; align-items: center; background: #090d16; border: 1px solid var(--border); padding: 5px 6px 5px 12px; border-radius: 14px; gap: 8px; font-size: 14px; font-weight: 800; }
        .btn-deposit { background: var(--accent-red); color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-deposit:active { opacity: 0.8; }
        
        .user-avatar { width: 36px; height: 36px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; border: 2px solid var(--border); }

        /* Main Game Terminal */
        .game-terminal { max-width: 580px; margin: auto; padding: 14px; box-sizing: border-box; }
        .game-card { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); padding: 16px; position: relative; overflow: hidden; box-shadow: 0 6px 24px rgba(0,0,0,0.25); }
        
        .game-canvas-wrap { background: #040811; border-radius: 14px; border: 1px solid rgba(255,255,255,0.03); position: relative; overflow: hidden; }
        .game-canvas { width: 100%; height: 230px; display: block; }
        
        .flight-counter { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -65%); text-align: center; pointer-events: none; width: 100%; }
        .live-mult { font-size: 58px; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 4px 16px rgba(0,0,0,0.7); }
        .live-status { font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 4px; }

        /* Betting Controls */
        .bet-control-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 12px; margin-top: 16px; }
        .bet-input-box { background: #0c1322; border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; display: flex; flex-direction: column; justify-content: center; }
        .bet-input-box label { font-size: 10px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin-bottom: 2px; }
        .bet-input { background: transparent; border: none; color: #fff; font-size: 24px; font-weight: 900; outline: none; width: 100%; }

        .btn-action { border-radius: 14px; font-size: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; border: none; transition: 0.1s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-action:active { transform: scale(0.97); }
        .btn-action.bet { background: var(--accent-green); color: #fff; }
        .btn-action.cash { background: var(--accent-red); color: #fff; }
        .btn-action:disabled { background: #0f172a; color: #475569; cursor: not-allowed; }

        /* FLOATING AI BUTTON */
        .ai-floating-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: #fff;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.45);
            cursor: pointer;
            z-index: 1000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: 0.2s ease;
        }
        .ai-floating-btn:active { transform: scale(0.92); }
        .ai-label { font-size: 16px; font-weight: 900; letter-spacing: 0.5px; line-height: 1; }
        .ai-sub { font-size: 8px; font-weight: 700; text-transform: uppercase; margin-top: 1px; opacity: 0.9; }

        /* Modals */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(9, 13, 22, 0.7); backdrop-filter: blur(6px); z-index: 5000; align-items: center; justify-content: center; padding: 14px; }
        .modal { background: #111827; border: 1px solid var(--border); width: 100%; max-width: 400px; padding: 24px; border-radius: 24px; text-align: center; box-sizing: border-box; }
        
        .input-group { text-align: left; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin-bottom: 4px; }
        .input-tech { width: 100%; padding: 13px 16px; background: #090d16; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; box-sizing: border-box; outline: none; color: #fff; }
        .input-tech:focus { border-color: #6366f1; }
        
        .btn-tech { width: 100%; padding: 15px; background: var(--accent-red); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 14px; text-transform: uppercase; margin-top: 8px; }
        .btn-tech:active { opacity: 0.8; }
        
        .auth-nav { display: flex; background: #1f2937; padding: 4px; border-radius: 12px; margin-bottom: 16px; }
        .auth-tab { flex: 1; padding: 10px; font-size: 12px; font-weight: 800; cursor: pointer; border-radius: 8px; color: var(--text-sub); text-align: center; }
        .auth-tab.active { background: #111827; color: #fff; }

        .chip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; }
        .amt-chip { border: 1px solid var(--border); padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 800; cursor: pointer; background: #0c1322; text-align: center; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-stack">
        <div class="top-nav">
            <div class="logo-wrap">
                <div class="logo-main">Aviator</div>
                <div class="logo-sub">Crash Terminal</div>
            </div>
            <div class="nav-right">
                <button id="signBtn" class="btn-deposit" style="background:#1e293b;" onclick="openModal('authModal')">Sign In</button>
                <div id="userIcon" class="user-avatar hidden" onclick="logout()">U</div>
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('fundsModal')" class="btn-deposit">Funds</button>
                </div>
            </div>
        </div>
    </div>

    <div class="game-terminal">
        <div class="game-card">
            <div class="game-canvas-wrap">
                <canvas id="gameCanvas" class="game-canvas" width="540" height="230"></canvas>
                <div class="flight-counter">
                    <div id="liveMultiplier" class="live-mult">1.00x</div>
                    <div id="liveStatus" class="live-status">Loading systems...</div>
                </div>
            </div>

            <div class="bet-control-grid">
                <div class="bet-input-box">
                    <label>Wager Amount</label>
                    <input type="number" id="wagerInput" class="bet-input" value="100" min="10">
                </div>
                <button id="actionBtn" onclick="handleWager()" class="btn-action bet" disabled>
                    <span>Place Bet</span>
                </button>
            </div>
        </div>
    </div>

    <div class="ai-floating-btn" onclick="openModal('predictionModal')">
        <div class="ai-label">AI</div>
        <div class="ai-sub">Signal</div>
    </div>

    <div id="predictionModal" class="overlay">
        <div class="modal" style="background: linear-gradient(145deg, #101725, #0a0e17); border-color: #4f46e5;">
            <div style="font-size: 10px; font-weight: 800; color: #818cf8; text-transform: uppercase; letter-spacing: 1px;">AI Cloud Engine</div>
            <h2 style="margin: 4px 0 12px 0; font-size: 20px; font-weight: 900;">Next Crash Point</h2>
            
            <div id="predictionValue" style="font-size: 56px; font-weight: 900; color: var(--accent-green); margin: 12px 0; text-shadow: 0 4px 18px rgba(16,185,129,0.35);">--.-x</div>
            <p id="predictionClock" style="color: var(--text-sub); font-size: 13px; margin: 0 0 18px 0; line-height: 1.4;">Waiting for the 20s scan phase to initialize...</p>
            
            <button onclick="closeModal('predictionModal')" class="btn-tech" style="background:#4f46e5;">Close Signal Terminal</button>
        </div>
    </div>

    <div id="authModal" class="overlay">
        <div class="modal">
            <div class="auth-nav">
                <div id="tabIn" class="auth-tab active" onclick="setAuth('in')">Sign In</div>
                <div id="tabUp" class="auth-tab" onclick="setAuth('up')">Sign Up</div>
            </div>
            <h2 id="aTitle" style="margin:0; font-size:18px; font-weight:800;">Log In</h2>
            <p id="aDesc" style="color:var(--text-sub); font-size:13px; margin: 4px 0 14px 0;">Sign into your account</p>
            
            <div id="signupFields" class="hidden">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="aName" class="input-tech" placeholder="John Doe">
                </div>
            </div>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="aEmail" class="input-tech" placeholder="example@gmail.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="aPass" class="input-tech" placeholder="••••••••">
            </div>

            <button onclick="submitAuth()" class="btn-tech" style="background:#6366f1;">Sign In</button>
            <p style="margin-top:12px; cursor:pointer; color:var(--text-sub); font-size:13px;" onclick="closeModal('authModal')">Cancel</p>
        </div>
    </div>

    <div id="fundsModal" class="overlay">
        <div class="modal">
            <div class="auth-nav">
                <div id="tabDep" class="auth-tab active" onclick="setFunds('deposit')">Deposit</div>
                <div id="tabWith" class="auth-tab" onclick="setFunds('withdraw')">Withdraw</div>
            </div>
            
            <h2 id="fTitle" style="margin:0; font-size:18px; font-weight:800;">Wallets</h2>
            <p id="fDesc" style="color:var(--text-sub); font-size:13px; margin: 4px 0 14px 0;">Direct Secure Processing</p>
            
            <div id="depInputFields">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" id="fName" class="input-tech" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>M-Pesa Number</label>
                    <input type="tel" id="fPhone" class="input-tech" placeholder="0712345678">
                </div>
            </div>
            <div id="withInputFields" class="hidden">
                <div class="input-group">
                    <label>M-Pesa Cashout Phone</label>
                    <input type="tel" id="withPhone" class="input-tech" placeholder="0712345678">
                </div>
            </div>
            <div class="input-group" style="margin-bottom:4px;">
                <label>Amount (Ksh)</label>
                <input type="text" id="fAmt" class="input-tech" style="font-size:22px; font-weight:900; text-align:center; color:#fff;" value="100.00">
            </div>
            <div class="chip-grid">
                <div class="amt-chip" onclick="setAmtValue(50)">50</div>
                <div class="amt-chip" onclick="setAmtValue(100)">100</div>
                <div class="amt-chip" onclick="setAmtValue(500)">500</div>
                <div class="amt-chip" onclick="setAmtValue(1000)">1k</div>
            </div>
            
            <button onclick="handleFunds()" class="btn-tech">Execute Payment</button>
            <p style="margin-top:12px; cursor:pointer; color:var(--text-sub); font-size:13px;" onclick="closeModal('fundsModal')">Cancel</p>
        </div>
    </div>

    <script>
        const SB_URL = "https://hwxnfzuwaeseszgsjeny.supabase.co";
        const SB_KEY = "sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        const LIPWA_LINK = "https://lipwa.link/8367";

        let userProfile = null;
        let activeAuth = 'in';
        let currentFundsMode = 'deposit';

        // Local live state engines
        let gameStatus = "waiting"; 
        let multiplier = 1.00;
        let crashPoint = 2.45;
        let currentWager = 0;
        let hasCashedOut = false;
        let loopStartTime = 0;

        window.onload = async () => {
            await syncUserAccount();
            await checkPaymentCallback();
            initCanvas();
            init20SecondCycle();
        };

        const cvs = document.getElementById('gameCanvas');
        const ctx = cvs.getContext('2d');

        function initCanvas() {
            function renderFrame() {
                ctx.clearRect(0, 0, cvs.width, cvs.height);
                
                ctx.strokeStyle = "rgba(255, 255, 255, 0.02)";
                ctx.lineWidth = 1;
                for (let x = 0; x < cvs.width; x += 40) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, cvs.height); ctx.stroke();
                }
                for (let y = 0; y < cvs.height; y += 40) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cvs.width, y); ctx.stroke();
                }

                if (gameStatus === "soaring") {
                    let progress = (multiplier - 1) / (crashPoint - 1 || 1);
                    progress = Math.min(progress, 1.0);

                    ctx.strokeStyle = "var(--accent-red)";
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(0, cvs.height);
                    
                    let endX = cvs.width * progress;
                    let endY = cvs.height - (cvs.height * 0.78 * Math.pow(progress, 1.35));
                    
                    ctx.quadraticCurveTo(cvs.width * progress * 0.45, cvs.height, endX, endY);
                    ctx.stroke();

                    ctx.fillStyle = "#fff";
                    ctx.beginPath(); ctx.arc(endX, endY, 6, 0, Math.PI * 2); ctx.fill();
                }
                requestAnimationFrame(renderFrame);
            }
            renderFrame();
        }

        // Strict 20-Second Game Setup System
        function init20SecondCycle() {
            gameStatus = "waiting";
            multiplier = 1.00;
            hasCashedOut = false;

            // Rule Check: Enforce a floor limit of exactly 2.00x
            crashPoint = parseFloat((2.00 + Math.random() * 5.5).toFixed(2));

            // Populate the predictions card right when waiting starts (exactly 20s prior to liftoff)
            document.getElementById('predictionValue').innerText = crashPoint.toFixed(2) + "x";
            document.getElementById('liveMultiplier').innerText = "1.00x";
            document.getElementById('liveMultiplier').style.color = "#fff";

            let prepTimeRemaining = 20;
            document.getElementById('liveStatus').innerText = `Preparing Launch: ${prepTimeRemaining}s`;
            document.getElementById('predictionClock').innerText = `Scanning completed. Next crash locked in exactly at ${crashPoint.toFixed(2)}x. Flight takes off in 20s.`;

            const btn = document.getElementById('actionBtn');
            btn.disabled = !userProfile;
            btn.className = "btn-action bet";
            btn.innerHTML = `<span>Place Bet</span>`;

            const clockTimer = setInterval(() => {
                prepTimeRemaining--;
                if (prepTimeRemaining > 0) {
                    document.getElementById('liveStatus').innerText = `Preparing Launch: ${prepTimeRemaining}s`;
                    document.getElementById('predictionClock').innerText = `Scanning completed. Next crash locked at ${crashPoint.toFixed(2)}x. Flight takes off in ${prepTimeRemaining}s.`;
                } else {
                    clearInterval(clockTimer);
                    document.getElementById('predictionClock').innerText = "Signal active! Flight trajectory currently in progress.";
                    launchFlight();
                }
            }, 1000);
        }

        function launchFlight() {
            gameStatus = "soaring";
            loopStartTime = performance.now();
            document.getElementById('liveStatus').innerText = "Airborne";

            const btn = document.getElementById('actionBtn');
            if (currentWager > 0) {
                btn.disabled = false;
                btn.className = "btn-action cash";
                btn.innerHTML = `<span>Cash Out</span><span style="font-size:11px; opacity:0.8;">at 1.00x</span>`;
            } else {
                btn.disabled = true;
            }

            function scaleRate() {
                if (gameStatus !== "soaring") return;
                let elapsed = (performance.now() - loopStartTime) / 1000;
                multiplier = parseFloat(Math.pow(1.085, elapsed * 2).toFixed(2));

                if (multiplier >= crashPoint) {
                    crashFlight();
                } else {
                    document.getElementById('liveMultiplier').innerText = multiplier.toFixed(2) + "x";
                    if (currentWager > 0 && !hasCashedOut) {
                        const win = (currentWager * multiplier).toFixed(2);
                        btn.innerHTML = `<span>Cash Out</span><span style="font-size:11px; opacity:0.8;">Ksh ${win}</span>`;
                    }
                    setTimeout(scaleRate, 85);
                }
            }
            scaleRate();
        }

        function crashFlight() {
            gameStatus = "crashed";
            document.getElementById('liveMultiplier').innerText = "FLEW AWAY!";
            document.getElementById('liveMultiplier').style.color = "var(--accent-red)";
            document.getElementById('liveStatus').innerText = "System reset loading...";

            const btn = document.getElementById('actionBtn');
            btn.disabled = true;
            btn.className = "btn-action bet";
            btn.innerHTML = `<span>Crashed</span>`;

            currentWager = 0;
            setTimeout(() => {
                init20SecondCycle();
            }, 4000);
        }

        async function handleWager() {
            if (!userProfile) return openModal('authModal');
            const btn = document.getElementById('actionBtn');

            if (gameStatus === "waiting") {
                const val = parseFloat(document.getElementById('wagerInput').value);
                if (isNaN(val) || val < 10) return alert("Minimum wager accepted is Ksh 10.");

                const bal = parseFloat(userProfile.balance || 0);
                if (val > bal) return alert("Insufficient available balance.");

                currentWager = val;
                const newBalanceValue = (bal - currentWager).toFixed(2);

                await supabase.from('profiles').update({ balance: newBalanceValue }).eq('email', userProfile.email);
                await syncUserAccount();

                btn.disabled = true;
                btn.innerHTML = `<span>Locked In</span>`;
                alert("Bet confirmed. Your prediction is active.");

            } else if (gameStatus === "soaring" && currentWager > 0 && !hasCashedOut) {
                hasCashedOut = true;
                const cashOutMultiplier = multiplier;
                const netPayout = (currentWager * cashOutMultiplier).toFixed(2);
                
                const curBal = parseFloat(userProfile.balance || 0);
                const newBalanceValue = (curBal + parseFloat(netPayout)).toFixed(2);

                await supabase.from('profiles').update({ balance: newBalanceValue }).eq('email', userProfile.email);
                await syncUserAccount();
                
                currentWager = 0;
                btn.disabled = true;
                btn.className = "btn-action bet";
                btn.innerHTML = `<span>Won</span>`;

                alert(`Success! Cashed out at ${cashOutMultiplier}x. Added Ksh ${parseFloat(netPayout).toLocaleString()}`);
            }
        }

        async function syncUserAccount() {
            const userEmail = localStorage.getItem('nx_user');
            if (userEmail) {
                const { data } = await supabase.from('profiles').select('*').eq('email', userEmail).single();
                if (data) {
                    userProfile = data;
                    document.getElementById('signBtn').classList.add('hidden');
                    document.getElementById('userIcon').classList.remove('hidden');
                    document.getElementById('balance').innerText = parseFloat(userProfile.balance || 0).toFixed(2);
                    if (userProfile.name) {
                        document.getElementById('fName').value = userProfile.name;
                    }
                    return;
                }
            }
            document.getElementById('signBtn').classList.remove('hidden');
            document.getElementById('userIcon').classList.add('hidden');
            document.getElementById('balance').innerText = "0.00";
        }

        async function checkPaymentCallback() {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status');
            const amt = parseFloat(params.get('amount'));
            const mail = localStorage.getItem('nx_user');

            if (status === 'success' && !isNaN(amt) && amt > 0 && mail) {
                const reference = params.get('reference');
                const existingCredits = JSON.parse(localStorage.getItem('added_tx') || '[]');

                if (!existingCredits.includes(reference)) {
                    const { data } = await supabase.from('profiles').select('balance').eq('email', mail).single();
                    if (data) {
                        const newBalanceValue = (parseFloat(data.balance || 0) + amt).toFixed(2);
                        await supabase.from('profiles').update({ balance: newBalanceValue }).eq('email', mail);

                        existingCredits.push(reference);
                        localStorage.setItem('added_tx', JSON.stringify(existingCredits));
                        
                        alert(`Successfully deposited Ksh ${amt.toLocaleString()}`);
                        window.history.replaceState({}, document.title, window.location.pathname);
                        await syncUserAccount();
                    }
                }
            }
        }

        function setAuth(m) {
            activeAuth = m;
            const sub = document.getElementById('signupFields');
            if (m === 'up') {
                sub.classList.remove('hidden');
                document.getElementById('tabUp').classList.add('active');
                document.getElementById('tabIn').classList.remove('active');
                document.getElementById('aTitle').innerText = "Create Account";
            } else {
                sub.classList.add('hidden');
                document.getElementById('tabIn').classList.add('active');
                document.getElementById('tabUp').classList.remove('active');
                document.getElementById('aTitle').innerText = "Log In";
            }
        }

        async function submitAuth() {
            const email = document.getElementById('aEmail').value.trim().toLowerCase();
            const pass = document.getElementById('aPass').value.trim();

            if (!email.includes('@')) return alert("Enter a valid email address.");
            if (pass.length < 4) return alert("Password must be at least 4 characters.");

            if (activeAuth === 'up') {
                const name = document.getElementById('aName').value.trim();
                if (!name) return alert("Full name required.");

                const { data: exists } = await supabase.from('profiles').select('email').eq('email', email).single();
                if (exists) return alert("Email already exists.");

                const { error } = await supabase.from('profiles').insert([{ email, pass, name, balance: 0.00 }]);
                if (error) return alert("Error creating profile: " + error.message);
                
                localStorage.setItem('nx_user', email);
                alert("Account created successfully!");
                closeModal('authModal');
                await syncUserAccount();
            } else {
                const { data, error } = await supabase.from('profiles').select('*').eq('email', email).eq('pass', pass).single();
                if (error || !data) return alert("Invalid email or password.");

                localStorage.setItem('nx_user', data.email);
                alert(`Hello ${data.name || data.email}`);
                closeModal('authModal');
                await syncUserAccount();
            }
        }

        function setFunds(m) {
            currentFundsMode = m;
            if (m === 'withdraw') {
                document.getElementById('tabWith').classList.add('active');
                document.getElementById('tabDep').classList.remove('active');
                document.getElementById('withInputFields').classList.remove('hidden');
                document.getElementById('depInputFields').classList.add('hidden');
            } else {
                document.getElementById('tabDep').classList.add('active');
                document.getElementById('tabWith').classList.remove('active');
                document.getElementById('withInputFields').classList.add('hidden');
                document.getElementById('depInputFields').classList.remove('hidden');
            }
        }

        function setAmtValue(val) { document.getElementById('fAmt').value = parseFloat(val).toFixed(2); }

        async function handleFunds() {
            if (!userProfile) return openModal('authModal');
            const amt = Number(document.getElementById('fAmt').value);
            if (isNaN(amt) || amt < 10) return alert("Minimum value required is Ksh 10.");

            if (currentFundsMode === 'withdraw') {
                const phone = document.getElementById('withPhone').value.trim();
                const bal = parseFloat(userProfile.balance || 0);
                if (amt > bal) return alert("Insufficient available balance.");

                const newBalanceValue = (bal - amt).toFixed(2);
                await supabase.from('profiles').update({ balance: newBalanceValue }).eq('email', userProfile.email);

                await syncUserAccount();
                closeModal('fundsModal');
                alert(`Withdrawal confirmed. Current wallet balance: Ksh ${newBalanceValue}`);
            } else {
                const phone = document.getElementById('fPhone').value.trim();
                const name = encodeURIComponent(document.getElementById('fName').value.trim());
                if (!phone || !name) return alert("Please fill in your name and active M-Pesa phone number.");

                const invoiceRef = "INV-" + Math.floor(Date.now() / 1000);
                closeModal('fundsModal');

                // Using your new custom domain
                const currentUrl = "https://polymarketsafrica.online/";
                const returnUrl = encodeURIComponent(`${currentUrl}?status=success&amount=${amt}&reference=${invoiceRef}`);
                
                window.location.href = `${LIPWA_LINK}?amount=${amt}&name=${name}&phone=${phone}&reference=${invoiceRef}&success_url=${returnUrl}&callback=${returnUrl}`;
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { 
            if (confirm("Log out of terminal?")) {
                localStorage.removeItem('nx_user');
                location.reload(); 
            }
        }
    </script>
</body>
</html>
