<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Gaming Terminal</title>

    <style>
        :root { 
            --aviator-bg: #000000;
            --main-panel-bg: #141516;
            --control-panel-bg: #1b1d20;
            --accent-green: #28a745;
            --bet-green: #12cf5c;
            --betika-dark: #101112;
            --betika-border: #1f2226;
            --text-primary: #ffffff;
            --text-secondary: #9ea3a8;
            --aviator-red: #d91d38;
        }
        
        body { 
            background: var(--betika-dark); 
            color: var(--text-primary); 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased; 
            box-sizing: border-box;
        }

        /* Fixed Top Header */
        .top-header-navbar {
            background: #181a1d;
            border-bottom: 1px solid var(--betika-border);
            position: fixed; top: 0; left: 0; right: 0;
            height: 56px; z-index: 2000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; box-sizing: border-box;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .exit-btn {
            background: #23262b; color: #fff; border: none; border-radius: 8px;
            padding: 6px 12px; font-weight: 700; font-size: 12px; cursor: pointer;
            text-transform: uppercase; display: flex; align-items: center;
        }

        .game-brand-labels { display: flex; flex-direction: column; line-height: 1.1; }
        .brand-main-text { font-weight: 900; font-size: 18px; color: var(--aviator-red); letter-spacing: -0.5px; text-transform: uppercase; }
        
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .user-balance-pill { 
            display: flex; align-items: center; background: rgba(0,0,0,0.4); 
            border: 1px solid var(--betika-border); padding: 5px 12px; 
            border-radius: 20px; font-size: 13px; font-weight: 800; color: #12cf5c; 
        }
        .user-balance-pill span { color: #8a8f95; font-weight: 700; font-size: 11px; margin-left: 4px; text-transform: uppercase; }
        
        .deposit-header-btn { 
            background: #12cf5c; color: #fff; border: none; 
            padding: 7px 14px; border-radius: 18px; font-weight: 800; 
            font-size: 12px; cursor: pointer; text-transform: uppercase; 
        }

        /* Main Game Content Area */
        .gameplay-layout-container {
            max-width: 800px; margin: 68px auto 24px;
            padding: 0 12px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 12px;
        }

        /* Visual Board styling matched to screen 2 and 3 */
        .aviator-flight-panel {
            background: #101112; border: 1px solid var(--betika-border);
            border-radius: 12px; padding: 8px; position: relative; overflow: hidden;
        }
        .canvas-container {
            background: #000000; border-radius: 10px; border: 1px solid rgba(255,255,255,0.01);
            position: relative; overflow: hidden; height: 210px; width: 100%;
        }
        .game-canvas { width: 100%; height: 100%; display: block; }
        
        /* Top small multipliers history bar */
        .history-pills-row {
            display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 8px;
            scrollbar-width: none; font-size: 11px; font-weight: 700;
        }
        .history-pills-row::-webkit-scrollbar { display: none; }
        .history-pill { background: #1c1d21; color: #34b3ff; padding: 3px 10px; border-radius: 12px; flex-shrink: 0; }
        .history-pill.high { color: #9457cd; }

        .flight-counter { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; pointer-events: none; width: 100%; z-index: 10;
        }
        .live-mult { font-size: 52px; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 4px 12px rgba(0,0,0,0.9); }
        .live-status { font-size: 13px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; margin-top: 6px; }

        /* Betting Controls Area */
        .betting-console-board {
            display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%;
        }
        @media(min-width: 600px) {
            .betting-console-board { grid-template-columns: 1fr 1fr; }
        }

        .control-dashboard-panel {
            background: #181a1d; border: 1px solid var(--betika-border);
            border-radius: 16px; padding: 12px; display: flex; flex-direction: column; gap: 10px;
        }
        
        .dashboard-category-tabs { 
            display: flex; background: #101112; border-radius: 20px; padding: 2px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .dashboard-tab { flex: 1; padding: 6px; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-align: center; cursor: pointer; border-radius: 18px; text-transform: uppercase; }
        .dashboard-tab.active { background: #2c3035; color: #fff; }

        .wager-entry-row { display: grid; grid-template-columns: 1fr 1.1fr; gap: 8px; align-items: center; }
        .wager-box { 
            background: #101112; border: 1px solid var(--betika-border); 
            border-radius: 14px; padding: 6px 12px; display: flex; flex-direction: column; justify-content: center; height: 58px; box-sizing: border-box;
        }
        
        /* Adjustment +/- Stepper style */
        .stepper-wager-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
        .stepper-btn { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 0 4px; font-weight: bold; }
        .wager-input { background: transparent; border: none; color: #fff; font-size: 18px; font-weight: 800; outline: none; width: 60px; text-align: center; }

        .bet-btn { 
            border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; border: none; transition: all 0.1s ease; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 58px;
        }
        .bet-btn:active { transform: scale(0.98); }
        .bet-btn.place { background: var(--bet-green); color: #fff; }
        .bet-btn.cash { background: #ea580c; color: #fff; }
        .bet-btn:disabled { background: #23262b; color: #525861; cursor: not-allowed; }

        .quick-amounts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .quick-amt-chip { border: 1px solid var(--betika-border); padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; background: #101112; text-align: center; color: #9ea3a8; }
        .quick-amt-chip:active { background: #2c2f34; color: #fff; }

        /* Independent Floating AI Prediction Tool */
        .floating-ai-assistant {
            position: fixed; bottom: 20px; right: 20px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff; border-radius: 50%; width: 56px; height: 56px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4); z-index: 3000;
            cursor: pointer; transition: transform 0.2s;
            border: 2px solid #a78bfa; text-align: center;
        }
        .floating-ai-assistant:active { transform: scale(0.92); }
        .floating-ai-label { font-size: 8px; font-weight: 900; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 1px; opacity: 0.9; }
        .floating-ai-value { font-size: 13px; font-weight: 800; }

        /* Inline Static Modal Dialogs */
        .overlay-screen { 
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(6px); z-index: 5000; align-items: center; justify-content: center; padding: 12px; 
        }
        .form-modal-card { 
            background: #181a1d; border: 1px solid var(--betika-border); 
            width: 100%; max-width: 340px; padding: 20px; border-radius: 16px; box-sizing: border-box; 
        }
        .form-input-group { text-align: left; margin-bottom: 12px; }
        .form-input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; }
        .form-input-control { 
            width: 100%; padding: 11px; background: #101112; border: 1px solid var(--betika-border); 
            border-radius: 10px; font-size: 14px; box-sizing: border-box; outline: none; color: #fff; 
        }
        .form-submit-btn { 
            width: 100%; padding: 12px; background: var(--bet-green); color: #fff; 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 13px; 
            text-transform: uppercase; margin-top: 6px; 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-header-navbar">
        <div class="header-left">
            <button class="exit-btn" onclick="window.location.reload()">✕ Back</button>
            <div class="game-brand-labels">
                <span class="brand-main-text">Aviator</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="user-balance-pill">
                <div id="balanceDisplay">3,000.00</div><span>KES</span>
            </div>
            <button onclick="openModal('depositModal')" class="deposit-header-btn">Deposit</button>
        </div>
    </div>

    <div class="gameplay-layout-container">
        <div class="history-pills-row" id="historyPills">
            <div class="history-pill">1.85x</div>
            <div class="history-pill high">3.90x</div>
            <div class="history-pill">1.00x</div>
            <div class="history-pill">1.92x</div>
            <div class="history-pill">1.51x</div>
            <div class="history-pill high">5.62x</div>
            <div class="history-pill">1.18x</div>
        </div>

        <div class="aviator-flight-panel">
            <div class="canvas-container">
                <canvas id="liveGameCanvas" class="game-canvas" width="540" height="210"></canvas>
                <div class="flight-counter">
                    <div id="liveDisplayMultiplier" class="live-mult">1.00x</div>
                    <div id="liveFlightStatusText" class="live-status">Loading Systems...</div>
                </div>
            </div>
        </div>

        <div class="betting-console-board">
            <div class="control-dashboard-panel">
                <div class="dashboard-category-tabs">
                    <div class="dashboard-tab active">Bet</div>
                    <div class="dashboard-tab">Auto</div>
                </div>
                <div class="wager-entry-row">
                    <div class="wager-box">
                        <div class="stepper-wager-controls">
                            <button class="stepper-btn" onclick="adjustWager(1, -10)">−</button>
                            <input type="number" id="wagerInput1" class="wager-input" value="10" min="10">
                            <button class="stepper-btn" onclick="adjustWager(1, 10)">+</button>
                        </div>
                    </div>
                    <button id="wagerSubmitBtn1" onclick="processWager(1)" class="bet-btn place">
                        <span>Bet</span><span style="font-size: 11px; font-weight: 700; margin-top:2px;" id="subLabel1">10.00 KES</span>
                    </button>
                </div>
                <div class="quick-amounts-grid">
                    <div class="quick-amt-chip" onclick="setFixedWager(1, 100)">100</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(1, 200)">200</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(1, 500)">500</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(1, 10000)">10,000</div>
                </div>
            </div>

            <div class="control-dashboard-panel">
                <div class="dashboard-category-tabs">
                    <div class="dashboard-tab active">Bet</div>
                    <div class="dashboard-tab">Auto</div>
                </div>
                <div class="wager-entry-row">
                    <div class="wager-box">
                        <div class="stepper-wager-controls">
                            <button class="stepper-btn" onclick="adjustWager(2, -10)">−</button>
                            <input type="number" id="wagerInput2" class="wager-input" value="10" min="10">
                            <button class="stepper-btn" onclick="adjustWager(2, 10)">+</button>
                        </div>
                    </div>
                    <button id="wagerSubmitBtn2" onclick="processWager(2)" class="bet-btn place">
                        <span>Bet</span><span style="font-size: 11px; font-weight: 700; margin-top:2px;" id="subLabel2">10.00 KES</span>
                    </button>
                </div>
                <div class="quick-amounts-grid">
                    <div class="quick-amt-chip" onclick="setFixedWager(2, 100)">100</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(2, 200)">200</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(2, 500)">500</div>
                    <div class="quick-amt-chip" onclick="setFixedWager(2, 10000)">10,000</div>
                </div>
            </div>
        </div>
    </div>

    <div id="aiOrb" class="floating-ai-assistant" onclick="alert('System targets optimized for the next flight!')">
        <div class="floating-ai-label">AI Signal</div>
        <div id="aiDirectPrediction" class="floating-ai-value">---</div>
    </div>

    <div id="depositModal" class="overlay-screen">
        <div class="form-modal-card">
            <h3 style="margin-top: 0; font-size: 16px; text-align: center;">Recharge Account</h3>
            <div class="form-input-group">
                <label>Amount (KES)</label>
                <input type="number" id="depositAmountInput" class="form-input-control" value="500">
            </div>
            <button onclick="applyManualDeposit()" class="form-submit-btn">Credit Account</button>
            <p style="text-align:center; font-size: 12px; color: var(--text-secondary); margin-bottom: 0; cursor: pointer;" onclick="closeModal('depositModal')">Dismiss</p>
        </div>
    </div>

    <script>
        // Memory-Based Storage
        let clientUserBalance = parseFloat(localStorage.getItem('terminal_balance') || '3000.00');

        let gameStatus = "waiting"; 
        let currentMultiplier = 1.00;
        let crashCeiling = 2.45;
        let previousTarget = 1.00;

        let activePanelBets = { 1: 0, 2: 0 };
        let cashoutStates = { 1: false, 2: false };
        let launchTimeMillis = 0;

        const cvs = document.getElementById('liveGameCanvas');
        const ctx = cvs.getContext('2d');

        window.onload = () => {
            updateVisualUIBalance();
            initializeCanvasFlight();
            triggerGameLoopEngine();
        };

        function updateVisualUIBalance() {
            document.getElementById('balanceDisplay').innerText = clientUserBalance.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            localStorage.setItem('terminal_balance', clientUserBalance.toString());
        }

        // Stepper adjusters
        function adjustWager(panel, delta) {
            const el = document.getElementById(`wagerInput${panel}`);
            let val = Math.max(10, (parseFloat(el.value) || 10) + delta);
            el.value = val;
            document.getElementById(`subLabel${panel}`).innerText = `${val.toFixed(2)} KES`;
        }

        function setFixedWager(panel, value) {
            const el = document.getElementById(`wagerInput${panel}`);
            el.value = value;
            document.getElementById(`subLabel${panel}`).innerText = `${value.toFixed(2)} KES`;
        }

        function initializeCanvasFlight() {
            function drawFrame() {
                ctx.clearRect(0, 0, cvs.width, cvs.height);
                
                // Flight Canvas Background Lines
                ctx.strokeStyle = "rgba(255, 255, 255, 0.02)";
                ctx.lineWidth = 1;
                for (let x = 0; x < cvs.width; x += 40) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, cvs.height); ctx.stroke();
                }
                for (let y = 0; y < cvs.height; y += 40) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cvs.width, y); ctx.stroke();
                }

                if (gameStatus === "flying") {
                    let progress = (currentMultiplier - 1.0) / (crashCeiling - 1.0 || 1.0);
                    progress = Math.min(progress, 1.0);

                    // Smooth Vector Trail mapping
                    ctx.strokeStyle = "var(--aviator-red)";
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(0, cvs.height);
                    let endX = cvs.width * progress;
                    let endY = cvs.height - (cvs.height * 0.72 * Math.pow(progress, 1.35));
                    
                    ctx.quadraticCurveTo(cvs.width * progress * 0.5, cvs.height, endX, endY);
                    ctx.stroke();

                    // Jet Pointer
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(endX, endY, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(drawFrame);
            }
            drawFrame();
        }

        function triggerGameLoopEngine() {
            gameStatus = "waiting";
            currentMultiplier = 1.00;
            cashoutStates = { 1: false, 2: false };

            // Pure random generation for testing purposes
            previousTarget = crashCeiling;
            crashCeiling = parseFloat((1.00 + Math.random() * 4.95).toFixed(2));

            // Floating indicator shows upcoming threshold
            document.getElementById('aiDirectPrediction').innerText = crashCeiling.toFixed(2) + "x";
            document.getElementById('liveDisplayMultiplier').innerText = "1.00x";
            document.getElementById('liveDisplayMultiplier').style.color = "#fff";

            let cycleTimer = 6;
            document.getElementById('liveFlightStatusText').innerText = `NEXT ROUND IN ${cycleTimer}s`;

            resetBetButtons();

            const timerSub = setInterval(() => {
                cycleTimer--;
                if (cycleTimer > 0) {
                    document.getElementById('liveFlightStatusText').innerText = `NEXT ROUND IN ${cycleTimer}s`;
                } else {
                    clearInterval(timerSub);
                    startTakeoffPhase();
                }
            }, 1000);
        }

        function resetBetButtons() {
            for (let i = 1; i <= 2; i++) {
                const btn = document.getElementById(`wagerSubmitBtn${i}`);
                const amountInput = parseFloat(document.getElementById(`wagerInput${i}`).value) || 10;
                btn.disabled = false;
                btn.className = "bet-btn place";
                btn.innerHTML = `<span>Bet</span><span style="font-size:11px; margin-top:2px;" id="subLabel${i}">${amountInput.toFixed(2)} KES</span>`;
                activePanelBets[i] = 0;
            }
        }

        function startTakeoffPhase() {
            gameStatus = "flying";
            launchTimeMillis = performance.now();
            document.getElementById('liveFlightStatusText').innerText = "Flying High";

            for (let i = 1; i <= 2; i++) {
                const btn = document.getElementById(`wagerSubmitBtn${i}`);
                if (activePanelBets[i] > 0) {
                    btn.disabled = false;
                    btn.className = "bet-btn cash";
                    btn.innerHTML = `<span>Cash Out</span><span style="font-size: 11px; margin-top:2px;" id="subLabel${i}">${activePanelBets[i].toFixed(2)} KES</span>`;
                } else {
                    btn.disabled = true;
                }
            }

            function fly() {
                if (gameStatus !== "flying") return;
                let elapsed = (performance.now() - launchTimeMillis) / 1000;
                currentMultiplier = parseFloat(Math.pow(1.085, elapsed * 1.8).toFixed(2));

                if (currentMultiplier >= crashCeiling) {
                    triggerCrashEvent();
                } else {
                    document.getElementById('liveDisplayMultiplier').innerText = currentMultiplier.toFixed(2) + "x";
                    
                    for (let i = 1; i <= 2; i++) {
                        if (activePanelBets[i] > 0 && !cashoutStates[i]) {
                            const btn = document.getElementById(`wagerSubmitBtn${i}`);
                            const currentPayout = (activePanelBets[i] * currentMultiplier).toFixed(2);
                            btn.innerHTML = `<span>Cash Out</span><span style="font-size: 11px; margin-top:2px;" id="subLabel${i}">${currentPayout} KES</span>`;
                        }
                    }
                    setTimeout(fly, 75);
                }
            }
            fly();
        }

        function triggerCrashEvent() {
            gameStatus = "crashed";
            document.getElementById('liveDisplayMultiplier').innerText = "FLEW AWAY!";
            document.getElementById('liveDisplayMultiplier').style.color = "var(--aviator-red)";
            document.getElementById('liveFlightStatusText').innerText = `${crashCeiling.toFixed(2)}x`;

            // Append multiplier history bar
            const pastLine = document.getElementById('historyPills');
            const item = document.createElement('div');
            item.className = `history-pill ${crashCeiling >= 2.0 ? 'high' : ''}`;
            item.innerText = crashCeiling.toFixed(2) + "x";
            pastLine.prepend(item);

            if (pastLine.children.length > 8) {
                pastLine.removeChild(pastLine.lastChild);
            }

            // Disable ongoing betting panels
            for (let i = 1; i <= 2; i++) {
                const btn = document.getElementById(`wagerSubmitBtn${i}`);
                btn.disabled = true;
                btn.className = "bet-btn place";
                btn.innerHTML = `<span>Crashed</span>`;
            }

            setTimeout(triggerGameLoopEngine, 3500);
        }

        function processWager(panel) {
            const stakeValue = parseFloat(document.getElementById(`wagerInput${panel}`).value) || 0;
            const btn = document.getElementById(`wagerSubmitBtn${panel}`);

            if (gameStatus === "waiting") {
                if (stakeValue > clientUserBalance) return alert("Insufficient account funds.");
                if (stakeValue < 10) return alert("Minimum bet required is 10 KES.");

                clientUserBalance -= stakeValue;
                activePanelBets[panel] = stakeValue;
                updateVisualUIBalance();

                btn.disabled = true;
                btn.innerHTML = `<span>Locked...</span>`;
            } else if (gameStatus === "flying" && activePanelBets[panel] > 0 && !cashoutStates[panel]) {
                cashoutStates[panel] = true;
                const netReturns = activePanelBets[panel] * currentMultiplier;
                clientUserBalance += netReturns;
                updateVisualUIBalance();

                activePanelBets[panel] = 0;
                btn.disabled = true;
                btn.className = "bet-btn place";
                btn.innerHTML = `<span>Cashed Out</span>`;
                alert(`Successfully cashed out at ${currentMultiplier}x! You won KES ${netReturns.toFixed(2)}`);
            }
        }

        function applyManualDeposit() {
            let amount = parseFloat(document.getElementById('depositAmountInput').value) || 0;
            if (amount <= 0) return alert("Enter a valid deposit amount.");
            clientUserBalance += amount;
            updateVisualUIBalance();
            closeModal('depositModal');
            alert(`Balance successfully loaded with KES ${amount.toLocaleString()}`);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
